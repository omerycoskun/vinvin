# Codemagic CI — Vın Vın'i Mac'siz derleyip TestFlight'a gönderir.
# Diğer 4 oyunda çalışan imza yöntemi: kalıcı private key (ios_signing grubunda
# CERTIFICATE_PRIVATE_KEY) + SPM kapalı + ortak "codemagic" ASC entegrasyonu.

workflows:
  ios-testflight:
    name: Vın Vın iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      app_store_connect: codemagic   # diğer oyunlarla aynı ASC entegrasyonu
    environment:
      flutter: stable
      groups:
        - ios_signing   # CERTIFICATE_PRIVATE_KEY (diğer oyunlarla aynı anahtar)
      vars:
        BUNDLE_ID: "com.omeryigitcoskun.vinvin"
    scripts:
      - name: Swift Package Manager'ı kapat (CocoaPods'a zorla)
        script: flutter config --no-enable-swift-package-manager
      - name: Flutter paketleri
        script: flutter pub get
      - name: Kod imzalama (kalıcı anahtarla sertifika + profil)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: IPA derle (otomatik artan build numarası)
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(date +%s) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
